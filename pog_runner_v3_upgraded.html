<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;overflow:hidden}
canvas{display:block;border:2px solid #F5A623;border-radius:4px;image-rendering:pixelated}
#ui{color:#F5A623;font-size:11px;margin-top:6px;text-align:center;letter-spacing:1px;opacity:0.7}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">SPACE/TAP=Jump · SHIFT/2xTap=Dash · G=Gravity Flip · S=Slow-Mo</div>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const W = 860, H = 320;
C.width = W; C.height = H;
C.style.maxWidth = '100%';

// ── AUDIO ENGINE ─────────────────────────────────────────
let audioCtx = null;
function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, type, dur, vol=0.18, delay=0){
  if(!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime + delay);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + dur);
  o.start(audioCtx.currentTime + delay);
  o.stop(audioCtx.currentTime + delay + dur);
}
function sfxJump(){ playTone(320,'sine',0.12,0.14); playTone(480,'sine',0.08,0.08,0.06); }
function sfxDoubleJump(){ playTone(520,'sine',0.1); playTone(780,'triangle',0.1,0.12,0.05); }
function sfxDash(){ playTone(200,'sawtooth',0.08,0.1); playTone(400,'sawtooth',0.06,0.08,0.04); }
function sfxCollect(){ playTone(660,'triangle',0.1,0.15); playTone(880,'triangle',0.08,0.12,0.06); playTone(1100,'sine',0.06,0.1,0.12); }
function sfxCombo(n){ const f=440+n*80; playTone(f,'square',0.15,0.18); playTone(f*1.5,'triangle',0.1,0.12,0.07); }
function sfxDeath(){ playTone(220,'sawtooth',0.2,0.22); playTone(150,'sawtooth',0.18,0.2,0.1); playTone(100,'square',0.15,0.15,0.2); }
function sfxGravity(){ playTone(180,'sine',0.2,0.2); playTone(300,'sine',0.15,0.15,0.1); }
function sfxSlowMo(){ playTone(440,'sine',0.3,0.15); playTone(220,'sine',0.12,0.12,0.15); }
function sfxHit(){ playTone(150,'square',0.15,0.2); playTone(100,'sawtooth',0.12,0.15,0.08); }
function sfxSpeedBurst(){ playTone(600,'square',0.1,0.15); playTone(900,'square',0.08,0.12,0.05); playTone(1200,'square',0.06,0.1,0.1); }

// ── BG MUSIC ──────────────────────────────────────────────
let bgNodes = [];
function startBGMusic(){
  if(!audioCtx) return;
  stopBGMusic();
  const notes = [130,146,164,174,196,220,246,261];
  const pattern = [0,2,4,2,5,3,1,3,4,2,0,2,3,5,4,2];
  let i = 0;
  function tick(){
    if(!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'square';
    o.frequency.value = notes[pattern[i % pattern.length]];
    g.gain.setValueAtTime(0.04, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
    o.start(); o.stop(audioCtx.currentTime + 0.18);
    i++;
    bgNodes.push(setTimeout(tick, 190));
  }
  tick();
}
function stopBGMusic(){ bgNodes.forEach(clearTimeout); bgNodes = []; }

// ── CONSTANTS ─────────────────────────────────────────────
const GRAV_NORMAL =  0.58;
const GRAV_FLIP   = -0.58;
const JUMP_FORCE  = -13;
const GROUND_Y    = H - 60;  // ground surface (feet land here)
const CEIL_Y      = 30;
const SPEED_INIT  = 4.2;
const SPEED_MAX   = 9.5;

// ── STATE ─────────────────────────────────────────────────
let state = 'start'; // start | play | dead | entry | leaderboard
let score=0, hiScore=0, frame=0, speed=SPEED_INIT;
let groundX=0, bgX=0;
let slowTimer=0, speedTimer=0, invincTimer=0;
let comboCount=0, comboTimer=0;
let nameInput='', entryDone=false;
let leaderboard = JSON.parse(localStorage.getItem('pog_lb') || '[]');

// ── PLAYER ────────────────────────────────────────────────
const player = {
  x:120, y:GROUND_Y, w:28, h:44,
  vy:0, vx:0,
  jumpsLeft:2, onGround:false, onCeil:false,
  gravDir: 1,   // 1=normal, -1=flipped
  dashing:false, dashTimer:0, dashCooldown:0,
  dead:false, deathTimer:0,
  lives: 3,
  animFrame:0, animTimer:0,
  trail:[],
  reset(){
    this.x=120; this.y=GROUND_Y; this.vy=0; this.vx=0;
    this.jumpsLeft=2; this.onGround=true; this.onCeil=false;
    this.gravDir=1; this.dashing=false; this.dashTimer=0; this.dashCooldown=0;
    this.dead=false; this.deathTimer=0; this.animFrame=0; this.trail=[];
  }
};

function doJump(){
  if(player.dead) return;
  if(player.jumpsLeft > 0){
    player.vy = player.gravDir * JUMP_FORCE;
    player.jumpsLeft--;
    player.onGround=false; player.onCeil=false;
    if(player.jumpsLeft===1) sfxJump(); else sfxDoubleJump();
  }
}
function doDash(){
  if(player.dead || player.dashCooldown>0) return;
  player.dashing=true; player.dashTimer=12; player.dashCooldown=45;
  sfxDash();
}
function doGravFlip(){
  if(player.dead) return;
  player.gravDir *= -1;
  player.vy = 0;
  player.jumpsLeft = 2;
  sfxGravity();
}
function doSlowMo(){
  if(slowTimer>0||score<15) return;
  slowTimer = 200; sfxSlowMo();
  score = Math.max(0, score-15);
}

// ── LIVES DISPLAY ─────────────────────────────────────────
function loseLife(){
  player.lives--;
  invincTimer = 90;
  sfxHit();
  if(player.lives<=0){
    player.dead=true; player.deathTimer=80; sfxDeath(); stopBGMusic();
    if(score>hiScore) hiScore=score;
  } else {
    player.dead=false; player.vy=0;
    player.y= player.gravDir===1 ? GROUND_Y : CEIL_Y;
  }
}

// ── PLATFORMS ─────────────────────────────────────────────
let platforms=[];
function mkPlatform(x){
  return {x, y: GROUND_Y-50-Math.random()*80, w:80+Math.random()*55, h:12};
}
platforms = [mkPlatform(380), mkPlatform(640)];

// ── OBSTACLES ─────────────────────────────────────────────
let bugs=[];
function mkBug(x){
  const tall = Math.random()>0.6;
  const flying = score>100 && Math.random()>0.65;
  const h = tall ? 38 : 26;
  const y = flying ? GROUND_Y - 40 - Math.random()*50 : GROUND_Y + player.h - h;
  return {x, y, w:20, h, animF:0, animT:0, flying, vy: flying ? Math.sin(frame*0.05)*0.5 : 0, flyPhase: Math.random()*Math.PI*2};
}

// ── POWER-UPS ─────────────────────────────────────────────
const PU_TYPES = ['SLOW','SPEED','SHIELD','LIFE'];
let powerups=[];
function mkPowerup(x){
  const t = PU_TYPES[Math.floor(Math.random()*PU_TYPES.length)];
  return {x, y: GROUND_Y - 30 - Math.random()*90, w:22, h:22, type:t, animT:Math.random()*Math.PI*2};
}

// ── COLLECTIBLES ──────────────────────────────────────────
const CODE_LABELS=['</>','{ }','AI','JS','TS','PY','DB','⚡','{}','=>','fn','//'];
let coins=[];
function mkCoin(x,y){
  return {x,y,w:18,h:18,label:CODE_LABELS[Math.floor(Math.random()*CODE_LABELS.length)],animT:Math.random()*Math.PI*2,collected:false};
}

// ── PARTICLES ─────────────────────────────────────────────
let particles=[];
function spawnParts(x,y,col,n=8,speed=3){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=1+Math.random()*speed;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,r:2+Math.random()*3,col});
  }
}
function spawnComboText(x,y,text){
  particles.push({x,y,vx:0,vy:-1.5,life:1.2,r:0,col:'#F5A623',text,isText:true});
}

// ── STARS ─────────────────────────────────────────────────
const stars=[];
for(let i=0;i<55;i++) stars.push({x:Math.random()*W,y:Math.random()*(H*0.5),r:Math.random()<0.2?1.5:0.9,t:Math.random()*Math.PI*2});

// ── BG BUILDINGS ──────────────────────────────────────────
const bgBuildings=[];
for(let i=0;i<22;i++) bgBuildings.push({x:i*90+Math.random()*50,w:22+Math.random()*36,h:48+Math.random()*88});

// ── TIMERS ────────────────────────────────────────────────
let bugTimer=90, coinTimer=55, platTimer=200, puTimer=300;

// ── INPUT ─────────────────────────────────────────────────
let keys={};
let lastTap=0, tapCount=0;
document.addEventListener('keydown',e=>{
  if(state==='entry'){
    if(e.key==='Enter'){ submitScore(); return; }
    if(e.key==='Backspace'){ nameInput=nameInput.slice(0,-1); return; }
    if(e.key.length===1 && nameInput.length<10) nameInput+=e.key.toUpperCase();
    return;
  }
  if(!keys[e.code]){
    keys[e.code]=true;
    if(['Space','ArrowUp','KeyW'].includes(e.code)){
      e.preventDefault();
      if(state==='start'||state==='dead') startGame();
      else if(state==='leaderboard') state='start';
      else doJump();
    }
    if(e.code==='ShiftLeft'||e.code==='ShiftRight') doDash();
    if(e.code==='KeyG') doGravFlip();
    if(e.code==='KeyS') doSlowMo();
  }
});
document.addEventListener('keyup',e=>keys[e.code]=false);

// touch
C.addEventListener('touchstart',e=>{
  e.preventDefault(); initAudio();
  const now=Date.now();
  if(now-lastTap<300){ tapCount++; } else tapCount=1;
  lastTap=now;
  if(state==='start'||state==='dead'){ startGame(); return; }
  if(state==='leaderboard'){ state='start'; return; }
  if(tapCount>=2) doDash(); else doJump();
},{passive:false});

C.addEventListener('mousedown',e=>{
  initAudio();
  if(state==='start'||state==='dead'){ startGame(); return; }
  if(state==='leaderboard'){ state='start'; return; }
  if(e.shiftKey) doDash(); else doJump();
});

function startGame(){
  initAudio();
  state='play'; score=0; frame=0; speed=SPEED_INIT;
  bugs=[]; coins=[]; particles=[]; powerups=[];
  platforms=[mkPlatform(420),mkPlatform(700)];
  bugTimer=90; coinTimer=55; platTimer=200; puTimer=350;
  slowTimer=0; speedTimer=0; invincTimer=0;
  comboCount=0; comboTimer=0;
  player.lives=3; player.reset();
  startBGMusic();
}

function submitScore(){
  const name = nameInput.trim()||'ANON';
  leaderboard.push({name, score:Math.floor(score)});
  leaderboard.sort((a,b)=>b.score-a.score);
  leaderboard=leaderboard.slice(0,8);
  localStorage.setItem('pog_lb',JSON.stringify(leaderboard));
  state='leaderboard';
}

// ── AABB ──────────────────────────────────────────────────
function aabb(a,b){ return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y; }

// ── UPDATE ────────────────────────────────────────────────
function update(){
  frame++;
  const timeMult = slowTimer>0 ? 0.38 : speedTimer>0 ? 1.6 : 1.0;
  const spd = speed * timeMult;
  speed = Math.min(SPEED_MAX, SPEED_INIT + score*0.0035);
  if(slowTimer>0) slowTimer--;
  if(speedTimer>0) speedTimer--;
  if(invincTimer>0) invincTimer--;
  if(comboTimer>0) comboTimer--; else comboCount=0;
  if(player.dashCooldown>0) player.dashCooldown--;

  bgX=(bgX+spd*0.12)%(W+200);
  groundX=(groundX-spd+W*4)%(W*4);
  stars.forEach(s=>s.t+=0.03);

  // Player physics
  if(!player.dead){
    // Dash
    if(player.dashing){
      player.vx = 18;
      player.dashTimer--;
      if(player.dashTimer<=0){ player.dashing=false; player.vx=0; }
    } else { player.vx=0; }

    // Gravity
    const grav = player.gravDir===1 ? GRAV_NORMAL : GRAV_FLIP;
    player.vy += grav;
    player.y  += player.vy;
    player.x  += player.vx;
    if(player.x>W*0.25) player.x=W*0.25;
    if(player.x<60) player.x=60;

    // Ground/ceil
    if(player.gravDir===1){
      if(player.y>=GROUND_Y){ player.y=GROUND_Y; player.vy=0; player.onGround=true; player.onCeil=false; player.jumpsLeft=2; }
    } else {
      if(player.y<=CEIL_Y){ player.y=CEIL_Y; player.vy=0; player.onGround=false; player.onCeil=true; player.jumpsLeft=2; }
    }
    if(player.y<CEIL_Y){ player.y=CEIL_Y; player.vy=0; }
    if(player.y>GROUND_Y){ player.y=GROUND_Y; player.vy=0; player.onGround=true; player.jumpsLeft=2; }

    // Platform collision
    platforms.forEach(p=>{
      const landing = player.gravDir===1
        ? player.vy>=0 && player.y+player.h>p.y && player.y+player.h<p.y+p.h+16
        : player.vy<=0 && player.y<p.y+p.h && player.y>p.y-16;
      if(landing && player.x+player.w-4>p.x && player.x+4<p.x+p.w){
        if(player.gravDir===1){ player.y=p.y-player.h; player.vy=0; player.onGround=true; player.jumpsLeft=2; }
        else { player.y=p.y+p.h; player.vy=0; player.onCeil=true; player.jumpsLeft=2; }
      }
    });

    // Trail
    if(player.dashing||slowTimer>0){
      player.trail.push({x:player.x+player.w/2,y:player.y+player.h/2,life:1});
    }
    player.trail.forEach(t=>t.life-=0.15);
    player.trail=player.trail.filter(t=>t.life>0);

    // Run anim
    if(player.onGround||player.onCeil){ player.animTimer++; if(player.animTimer%6===0) player.animFrame=(player.animFrame+1)%4; }

    // Bug collision
    if(invincTimer<=0){
      bugs.forEach(b=>{
        if(aabb({x:player.x+4,y:player.y+5,w:player.w-8,h:player.h-8},b)){
          if(player.dashing){
            // dash kills bug
            spawnParts(b.x+b.w/2,b.y+b.h/2,'#cc2200',12,4);
            b.dead=true; score+=20; sfxCollect();
          } else { loseLife(); spawnParts(player.x+player.w/2,player.y+player.h/2,'#cc2200',10,3); }
        }
      });
      bugs=bugs.filter(b=>!b.dead);
    }

    // Coin collision
    coins.forEach(c=>{
      if(!c.collected&&aabb({x:player.x+3,y:player.y+3,w:player.w-6,h:player.h-6},c)){
        c.collected=true; comboCount++; comboTimer=80;
        const bonus = comboCount>=5?20:comboCount>=3?15:10;
        score+=bonus; sfxCollect();
        spawnParts(c.x+c.w/2,c.y+c.h/2,'#F5A623',8,3);
        if(comboCount>=3){ sfxCombo(comboCount); spawnComboText(player.x,player.y-10,`COMBO x${comboCount}! +${bonus}`); }
      }
    });

    // Powerup collision
    powerups.forEach(p=>{
      if(!p.collected&&aabb({x:player.x+3,y:player.y+3,w:player.w-6,h:player.h-6},p)){
        p.collected=true;
        if(p.type==='SLOW'){ slowTimer=180; sfxSlowMo(); spawnComboText(player.x,player.y-10,'SLOW-MO!'); }
        if(p.type==='SPEED'){ speedTimer=120; sfxSpeedBurst(); spawnComboText(player.x,player.y-10,'SPEED BURST!'); }
        if(p.type==='SHIELD'){ invincTimer=200; spawnComboText(player.x,player.y-10,'SHIELD!'); }
        if(p.type==='LIFE'&&player.lives<5){ player.lives++; spawnComboText(player.x,player.y-10,'+LIFE ❤️'); }
        spawnParts(p.x+p.w/2,p.y+p.h/2,puColor(p.type),10,3);
      }
    });
    powerups=powerups.filter(p=>!p.collected);

    score += spd*0.018;
  } else {
    player.deathTimer--;
    player.vy+=GRAV_NORMAL*0.4; player.y+=player.vy;
    if(player.deathTimer<=0){ state='entry'; nameInput=''; }
  }

  // Scroll everything
  platforms.forEach(p=>p.x-=spd); platforms=platforms.filter(p=>p.x+p.w>-10);
  platTimer--; if(platTimer<=0){ platforms.push(mkPlatform(W+10)); platTimer=150+Math.random()*110; }

  bugs.forEach(b=>{ b.x-=spd; b.animT++; if(b.animT%8===0) b.animF=(b.animF+1)%2; if(b.flying) b.y=b.y+Math.sin(b.flyPhase+frame*0.04)*0.6; });
  bugs=bugs.filter(b=>b.x+b.w>-10);
  bugTimer--; if(bugTimer<=0&&state==='play'){
    bugs.push(mkBug(W+20));
    bugTimer=Math.max(35,90-score*0.025+Math.random()*55);
  }

  coins.forEach(c=>{ c.x-=spd; c.animT+=0.1; });
  coins=coins.filter(c=>c.x+c.w>-10&&!c.collected);
  coinTimer--; if(coinTimer<=0){
    const y=GROUND_Y-25-Math.random()*95;
    const n=2+Math.floor(Math.random()*3);
    for(let i=0;i<n;i++) coins.push(mkCoin(W+15+i*28,y));
    coinTimer=60+Math.random()*55;
  }

  powerups.forEach(p=>{ p.x-=spd; p.animT+=0.07; });
  powerups=powerups.filter(p=>p.x+p.w>-10&&!p.collected);
  puTimer--; if(puTimer<=0){ powerups.push(mkPowerup(W+20)); puTimer=280+Math.random()*180; }

  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life-=0.025; });
  particles=particles.filter(p=>p.life>0);
}

// ── DRAW HELPERS ──────────────────────────────────────────
function px(v){return Math.round(v);}
function rr(x,y,w,h,r,fill,stroke,sw=1){
  ctx.beginPath();
  ctx.moveTo(px(x+r),px(y)); ctx.lineTo(px(x+w-r),px(y));
  ctx.quadraticCurveTo(px(x+w),px(y),px(x+w),px(y+r));
  ctx.lineTo(px(x+w),px(y+h-r)); ctx.quadraticCurveTo(px(x+w),px(y+h),px(x+w-r),px(y+h));
  ctx.lineTo(px(x+r),px(y+h)); ctx.quadraticCurveTo(px(x),px(y+h),px(x),px(y+h-r));
  ctx.lineTo(px(x),px(y+r)); ctx.quadraticCurveTo(px(x),px(y),px(x+r),px(y));
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw;ctx.stroke();}
}
function puColor(t){ return t==='SLOW'?'#00ccff':t==='SPEED'?'#ff6600':t==='SHIELD'?'#00ff88':t==='LIFE'?'#ff3366':'#fff'; }

// ── DRAW BG ────────────────────────────────────────────────
function drawBG(){
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, slowTimer>0?'#001122':speedTimer>0?'#110500':'#050508');
  grad.addColorStop(1, slowTimer>0?'#002233':speedTimer>0?'#1a0800':'#0a0a0f');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  stars.forEach(s=>{
    ctx.globalAlpha=0.2+(Math.sin(s.t)+1)*0.35;
    ctx.fillStyle=Math.random()>0.8?'#F5A623':'#fff';
    ctx.beginPath(); ctx.arc(px(s.x),px(s.y),s.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // buildings
  const gBase=GROUND_Y+player.h;
  bgBuildings.forEach(b=>{
    const bx=((b.x-bgX*0.4)%(W+200)+W+200)%(W+200)-100;
    ctx.fillStyle='#0d0d0d';
    ctx.fillRect(px(bx),gBase-b.h,b.w,b.h);
    ctx.fillStyle='rgba(245,166,35,0.1)';
    for(let wy=gBase-b.h+6;wy<gBase-8;wy+=14)
      for(let wx=bx+4;wx<bx+b.w-4;wx+=10)
        if(Math.sin(wx*0.31+wy*0.71)>0.5) ctx.fillRect(px(wx),wy,5,6);
  });
}

// ── DRAW GROUND ────────────────────────────────────────────
function drawGround(){
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,GROUND_Y+player.h,W,H-(GROUND_Y+player.h));
  ctx.fillStyle=slowTimer>0?'#00ccff':speedTimer>0?'#ff6600':'#F5A623';
  ctx.fillRect(0,GROUND_Y+player.h,W,3);
  // ceiling line (for gravity flip awareness)
  ctx.fillStyle='rgba(245,166,35,0.3)';
  ctx.fillRect(0,CEIL_Y,W,2);
  // speed lines
  ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1;
  const off=(W*4-groundX)%60;
  for(let x=-60+off;x<W+60;x+=60){
    ctx.beginPath(); ctx.moveTo(px(x),GROUND_Y+player.h+10); ctx.lineTo(px(x)+38,GROUND_Y+player.h+10); ctx.stroke();
  }
}

// ── DRAW PLATFORM ──────────────────────────────────────────
function drawPlatform(p){
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(px(p.x)+3,px(p.y)+p.h+3,p.w,5);
  rr(p.x,p.y,p.w,p.h,2,'#cc8800',null);
  ctx.fillStyle='#ffbe4d'; ctx.fillRect(px(p.x)+2,px(p.y),p.w-4,4);
}

// ── DRAW COIN ──────────────────────────────────────────────
function drawCoin(c){
  const y=px(c.y+Math.sin(c.animT)*4);
  ctx.shadowBlur=8; ctx.shadowColor='#F5A623';
  rr(c.x,y,c.w,c.h,3,'#cc8800','#F5A623',1.2);
  ctx.shadowBlur=0;
  ctx.fillStyle='#0d0d0d'; ctx.font='bold 7px monospace'; ctx.textAlign='center';
  ctx.fillText(c.label,px(c.x+c.w/2),y+c.h/2+2.5);
}

// ── DRAW POWERUP ───────────────────────────────────────────
function drawPowerup(p){
  const y=px(p.y+Math.sin(p.animT)*5);
  const col=puColor(p.type);
  ctx.shadowBlur=12; ctx.shadowColor=col;
  rr(p.x,y,p.w,p.h,4,'#0d0d0d',col,2);
  ctx.shadowBlur=0;
  ctx.fillStyle=col; ctx.font='bold 7px monospace'; ctx.textAlign='center';
  const labels={SLOW:'⏱',SPEED:'⚡',SHIELD:'🛡',LIFE:'❤'};
  ctx.fillText(labels[p.type]||p.type[0],px(p.x+p.w/2),y+p.h/2+3);
}

// ── DRAW BUG ───────────────────────────────────────────────
function drawBug(b){
  const x=px(b.x),y=px(b.y),blink=b.animF===1;
  if(b.flying){ ctx.shadowBlur=8; ctx.shadowColor='#ff6600'; }
  rr(x,y,b.w,b.h,2,b.flying?'#992200':'#cc2200','#ff3300',1);
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff'; ctx.fillRect(x+3,y+4,4,4); ctx.fillRect(x+b.w-7,y+4,4,4);
  ctx.fillStyle='#0d0d0d'; ctx.fillRect(x+4,y+5,2,2); ctx.fillRect(x+b.w-6,y+5,2,2);
  ctx.strokeStyle='#ff3300'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(x+5,y); ctx.lineTo(x+3,y-7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+b.w-5,y); ctx.lineTo(x+b.w-3,y-7); ctx.stroke();
  ctx.fillStyle='#ff5500'; ctx.beginPath(); ctx.arc(x+3,y-7,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+b.w-3,y-7,2,0,Math.PI*2); ctx.fill();
  const ly=y+b.h*0.6, off=blink?3:0;
  ctx.strokeStyle='#cc2200'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(x+4,ly); ctx.lineTo(x-4,ly+off+4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+b.w-4,ly); ctx.lineTo(x+b.w+4,ly+off+4); ctx.stroke();
  if(b.flying){
    ctx.strokeStyle='rgba(255,100,0,0.4)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,y+b.h/2); ctx.lineTo(x-12,y+b.h/2-3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x,y+b.h/2); ctx.lineTo(x-12,y+b.h/2+3); ctx.stroke();
  }
}

// ── DRAW PLAYER ────────────────────────────────────────────
function drawPlayer(p){
  const x=px(p.x), y=px(p.y);
  const flipped = p.gravDir===-1;
  const alive=!p.dead;
  const blink = invincTimer>0 && Math.floor(invincTimer/5)%2===0;
  if(blink){ ctx.globalAlpha=0.3; }

  // Trail
  p.trail.forEach(t=>{
    ctx.globalAlpha=t.life*0.35;
    ctx.fillStyle=slowTimer>0?'#00ccff':'#F5A623';
    ctx.fillRect(px(t.x-6),px(t.y-10),12,20);
  });
  ctx.globalAlpha=blink?0.3:1;

  // Dash glow
  if(p.dashing){ ctx.shadowBlur=18; ctx.shadowColor='#F5A623'; }
  // Shield glow
  if(invincTimer>0 && !blink){ ctx.shadowBlur=14; ctx.shadowColor='#00ff88'; }

  const ctx2 = ctx;
  ctx2.save();
  if(flipped){ ctx2.translate(x+p.w/2, y+p.h/2); ctx2.scale(1,-1); ctx2.translate(-(x+p.w/2),-(y+p.h/2)); }

  const lf=[[0,0],[6,-4],[0,0],[-6,-4]][p.animFrame];
  const rf=[[0,0],[6,-4],[0,0],[-6,-4]][(p.animFrame+2)%4];

  ctx2.fillStyle='#222';
  ctx2.fillRect(x+4+lf[0],y+p.h-18,8,18);
  ctx2.fillStyle='#0d0d0d'; ctx2.fillRect(x+2+lf[0],y+p.h-4,11,5);
  ctx2.fillStyle='#222'; ctx2.fillRect(x+p.w-12+rf[0],y+p.h-18,8,18);
  ctx2.fillStyle='#0d0d0d'; ctx2.fillRect(x+p.w-13+rf[0],y+p.h-4,11,5);

  ctx2.fillStyle=alive?'#F5A623':'#cc2200';
  ctx2.fillRect(x+2,y+p.h-36,p.w-4,19);
  ctx2.fillStyle='#cc8800'; ctx2.fillRect(x+5,y+p.h-31,p.w-10,4);
  ctx2.fillStyle='#0d0d0d'; ctx2.font='bold 5px monospace'; ctx2.textAlign='center';
  ctx2.fillText('POG',x+p.w/2,y+p.h-28);

  const aL=p.animFrame===1?4:-4, aR=p.animFrame===1?-4:4;
  ctx2.fillStyle=alive?'#F5A623':'#cc2200';
  ctx2.fillRect(x-5,y+p.h-34+aL,7,16); ctx2.fillStyle='#c8956c'; ctx2.fillRect(x-6,y+p.h-20+aL,7,6);
  ctx2.fillStyle=alive?'#F5A623':'#cc2200';
  ctx2.fillRect(x+p.w-2,y+p.h-34+aR,7,16); ctx2.fillStyle='#c8956c'; ctx2.fillRect(x+p.w-1,y+p.h-20+aR,7,6);

  // Head
  rr(x+2,y+p.h-56,p.w-4,24,3,'#c8956c',null,0,ctx2);
  rr(x+2,y+p.h-56,p.w-4,10,2,'#1a1a1a',null,0,ctx2);
  rr(x,y+p.h-54,6,7,1,'#1a1a1a',null,0,ctx2);
  rr(x+p.w-6,y+p.h-54,6,7,1,'#1a1a1a',null,0,ctx2);
  rr(x+p.w/2-4,y+p.h-62,8,10,1,'#1a1a1a',null,0,ctx2);
  rr(x+5,y+p.h-46,8,6,1,'rgba(120,220,255,0.15)','#0d0d0d',1.2,ctx2);
  rr(x+p.w-13,y+p.h-46,8,6,1,'rgba(120,220,255,0.15)','#0d0d0d',1.2,ctx2);
  ctx2.beginPath(); ctx2.moveTo(x+13,y+p.h-43); ctx2.lineTo(x+p.w-13,y+p.h-43); ctx2.strokeStyle='#0d0d0d'; ctx2.lineWidth=1; ctx2.stroke();
  ctx2.fillStyle='#0d0d0d'; ctx2.fillRect(x+7,y+p.h-44,3,3); ctx2.fillRect(x+p.w-10,y+p.h-44,3,3);
  ctx2.fillStyle='#c8956c'; ctx2.fillRect(x,y+p.h-48,3,6); ctx2.fillRect(x+p.w-3,y+p.h-48,3,6);
  rr(x,y+p.h-57,p.w,5,1,'#0d0d0d',null,0,ctx2);
  rr(x-5,y+p.h-53,10,3,1,'#0d0d0d',null,0,ctx2);

  ctx2.restore();
  ctx2.shadowBlur=0; ctx2.globalAlpha=1;

  // Gravity flip indicator
  if(flipped){
    ctx2.fillStyle='rgba(245,166,35,0.6)';
    ctx2.font='bold 8px monospace'; ctx2.textAlign='center';
    ctx2.fillText('▼ FLIPPED',x+p.w/2,y-6);
  }
  // Dash indicator
  if(p.dashing){
    ctx2.fillStyle='rgba(245,166,35,0.5)';
    for(let i=1;i<=3;i++) ctx2.fillRect(x-i*10,y+p.h/2-3,6,6);
  }
}

// ── DRAW PARTICLES ─────────────────────────────────────────
function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=Math.min(1,p.life);
    if(p.isText){
      ctx.fillStyle=p.col; ctx.font='bold 11px monospace'; ctx.textAlign='center';
      ctx.fillText(p.text,px(p.x+14),px(p.y));
    } else {
      ctx.fillStyle=p.col;
      ctx.beginPath(); ctx.arc(px(p.x),px(p.y),p.r,0,Math.PI*2); ctx.fill();
    }
  });
  ctx.globalAlpha=1;
}

// ── DRAW HUD ───────────────────────────────────────────────
function drawHUD(){
  // Score
  rr(8,8,178,32,3,'#0d0d0d','#F5A623',1);
  ctx.fillStyle='#555'; ctx.font='bold 8px monospace'; ctx.textAlign='left';
  ctx.fillText('PLAYER 1  ·  POG SUDARSHAN',16,20);
  ctx.fillStyle='#F5A623'; ctx.font='bold 13px monospace';
  ctx.fillText(`SCORE: ${Math.floor(score).toString().padStart(6,'0')}`,16,34);

  // Lives
  ctx.fillStyle='#555'; ctx.font='bold 9px monospace'; ctx.textAlign='left';
  ctx.fillText('LIVES:',8,52);
  for(let i=0;i<5;i++){
    ctx.fillStyle=i<player.lives?'#F5A623':'#333';
    ctx.font='bold 12px monospace'; ctx.textAlign='left';
    ctx.fillText('❤',50+i*18,53);
  }

  // Combo
  if(comboCount>=2&&comboTimer>0){
    ctx.fillStyle='#F5A623'; ctx.font=`bold ${10+comboCount}px monospace`; ctx.textAlign='left';
    ctx.globalAlpha=comboTimer/80;
    ctx.fillText(`COMBO x${comboCount}`,8,68);
    ctx.globalAlpha=1;
  }

  // Hi score
  rr(W-155,8,147,32,3,'#0d0d0d','#555',1);
  ctx.fillStyle='#555'; ctx.font='bold 8px monospace'; ctx.textAlign='left';
  ctx.fillText('HI-SCORE',W-148,20);
  ctx.fillStyle='#ffbe4d'; ctx.font='bold 13px monospace';
  ctx.fillText(Math.floor(hiScore).toString().padStart(6,'0'),W-148,34);

  // Speed bar
  const spd=(speed-SPEED_INIT)/(SPEED_MAX-SPEED_INIT);
  rr(W/2-55,8,110,12,2,'#0d0d0d','#333',1);
  if(spd>0) rr(W/2-53,9,106*spd,8,1,speedTimer>0?'#ff6600':'#F5A623',null);
  ctx.fillStyle='#666'; ctx.font='bold 7px monospace'; ctx.textAlign='center';
  ctx.fillText('SPEED',W/2,17);

  // Active power indicators
  let pi=0;
  if(slowTimer>0){
    rr(W/2-55,24,68,12,2,'rgba(0,200,255,0.15)','#00ccff',1);
    ctx.fillStyle='#00ccff'; ctx.font='bold 7px monospace'; ctx.textAlign='center';
    ctx.fillText(`⏱ SLOW ${Math.ceil(slowTimer/60)}s`,W/2-21,33);
    pi++;
  }
  if(speedTimer>0){
    rr(W/2+15,24,68,12,2,'rgba(255,100,0,0.15)','#ff6600',1);
    ctx.fillStyle='#ff6600'; ctx.font='bold 7px monospace'; ctx.textAlign='center';
    ctx.fillText(`⚡ FAST ${Math.ceil(speedTimer/60)}s`,W/2+49,33);
  }
  if(invincTimer>0){
    rr(W/2-24,38,48,12,2,'rgba(0,255,136,0.15)','#00ff88',1);
    ctx.fillStyle='#00ff88'; ctx.font='bold 7px monospace'; ctx.textAlign='center';
    ctx.fillText(`🛡 ${Math.ceil(invincTimer/60)}s`,W/2,47);
  }

  // Controls reminder (small)
  ctx.fillStyle='#333'; ctx.font='bold 7px monospace'; ctx.textAlign='right';
  ctx.fillText('SPACE=Jump  SHIFT=Dash  G=Flip  S=Slow',W-8,H-8);
}

// ── DRAW OVERLAYS ──────────────────────────────────────────
function drawStart(){
  ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#F5A623'; ctx.font='bold 44px monospace'; ctx.textAlign='center';
  ctx.fillText('POG RUNNER',W/2,H/2-72);
  ctx.fillStyle='#ffbe4d'; ctx.font='bold 13px monospace';
  ctx.fillText('SUDARSHAN · BUILDER · CREATOR · v2.0',W/2,H/2-46);

  // Controls
  const moves=[
    ['SPACE / TAP','Jump (x2 = double jump)'],
    ['SHIFT / 2x TAP','Dash through bugs!'],
    ['G','Gravity flip'],
    ['S (-15pts)','Slow-Mo mode'],
  ];
  moves.forEach((m,i)=>{
    rr(W/2-180,H/2-25+i*26,360,22,3,'#0d0d0d',i%2===0?'#F5A623':'#444',1);
    ctx.fillStyle='#F5A623'; ctx.font='bold 10px monospace'; ctx.textAlign='left';
    ctx.fillText(`[${m[0]}]`,W/2-172,H/2-9+i*26);
    ctx.fillStyle='#888'; ctx.fillText(m[1],W/2-80,H/2-9+i*26);
  });

  rr(W/2-90,H/2+82,180,36,4,'#F5A623',null);
  ctx.fillStyle='#0d0d0d'; ctx.font='bold 18px monospace'; ctx.textAlign='center';
  ctx.fillText('▶ START',W/2,H/2+106);
}

function drawEntry(){
  ctx.fillStyle='rgba(0,0,0,0.88)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#cc2200'; ctx.font='bold 34px monospace'; ctx.textAlign='center';
  ctx.fillText('GAME OVER',W/2,H/2-80);
  ctx.fillStyle='#F5A623'; ctx.font='bold 15px monospace';
  ctx.fillText(`YOUR SCORE: ${Math.floor(score)}`,W/2,H/2-48);
  ctx.fillStyle='#ffbe4d'; ctx.font='bold 13px monospace';
  ctx.fillText(`BEST: ${Math.floor(hiScore)}`,W/2,H/2-28);
  ctx.fillStyle='#888'; ctx.font='bold 12px monospace';
  ctx.fillText('Enter your name for the leaderboard:',W/2,H/2+2);
  rr(W/2-100,H/2+12,200,30,3,'#0d0d0d','#F5A623',1.5);
  ctx.fillStyle='#F5A623'; ctx.font='bold 16px monospace'; ctx.textAlign='center';
  ctx.fillText((nameInput||'') + (Math.floor(frame/20)%2===0?'_':''),W/2,H/2+33);
  ctx.fillStyle='#555'; ctx.font='bold 10px monospace';
  ctx.fillText('Type your name · ENTER to submit',W/2,H/2+58);
  rr(W/2-75,H/2+68,150,28,3,'rgba(245,166,35,0.15)','#555',1);
  ctx.fillStyle='#555'; ctx.font='bold 11px monospace';
  ctx.fillText('ENTER → Submit',W/2,H/2+86);
}

function drawLeaderboard(){
  ctx.fillStyle='rgba(0,0,0,0.92)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#F5A623'; ctx.font='bold 28px monospace'; ctx.textAlign='center';
  ctx.fillText('🏆 LEADERBOARD',W/2,50);
  ctx.fillStyle='#ffbe4d'; ctx.font='bold 11px monospace';
  ctx.fillText('POG RUNNER — TOP SCORES',W/2,70);
  const medals=['🥇','🥈','🥉'];
  leaderboard.slice(0,8).forEach((e,i)=>{
    const y=100+i*26;
    rr(W/2-160,y-16,320,22,3,i<3?'rgba(245,166,35,0.1)':'rgba(30,30,30,0.8)',i<3?'#F5A623':'#333',1);
    ctx.fillStyle=i<3?'#F5A623':'#888'; ctx.font=`bold ${i<3?13:11}px monospace`; ctx.textAlign='left';
    ctx.fillText(`${medals[i]||` ${i+1}.`}  ${e.name}`,W/2-150,y);
    ctx.textAlign='right';
    ctx.fillText(e.score.toString().padStart(6,'0'),W/2+150,y);
  });
  if(leaderboard.length===0){
    ctx.fillStyle='#444'; ctx.font='bold 13px monospace'; ctx.textAlign='center';
    ctx.fillText('No scores yet. Be the first!',W/2,160);
  }
  rr(W/2-90,H-60,180,36,4,'#F5A623',null);
  ctx.fillStyle='#0d0d0d'; ctx.font='bold 16px monospace'; ctx.textAlign='center';
  ctx.fillText('▶ PLAY AGAIN',W/2,H-37);
}

// ── MAIN LOOP ──────────────────────────────────────────────
function loop(){
  if(state==='play') update();
  drawBG(); drawGround();
  platforms.forEach(drawPlatform);
  coins.forEach(drawCoin);
  powerups.forEach(drawPowerup);
  bugs.forEach(drawBug);
  drawParticles();
  if(state!=='start') drawPlayer(player);
  drawHUD();
  if(state==='start') drawStart();
  if(state==='entry') drawEntry();
  if(state==='leaderboard') drawLeaderboard();
  requestAnimationFrame(loop);
}
loop();
</script>
